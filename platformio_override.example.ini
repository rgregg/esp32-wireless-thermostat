[env:esp32-furnace-thermostat]
build_flags =
  ${env:esp32-furnace-thermostat.build_flags}
  ; Optional static WiFi credentials. Leave commented to use BLE provisioning + saved creds.
  ; -DTHERMOSTAT_WIFI_SSID=\"YOUR_WIFI_SSID\"
  ; -DTHERMOSTAT_WIFI_PASSWORD=\"YOUR_WIFI_PASSWORD\"
  -DTHERMOSTAT_MQTT_HOST=\"192.168.1.10\"
  -DTHERMOSTAT_MQTT_PORT=1883
  -DTHERMOSTAT_MQTT_USER=\"mqtt_user\"
  -DTHERMOSTAT_MQTT_PASSWORD=\"mqtt_password\"
  -DTHERMOSTAT_BASE_TOPIC=\"esp32-wireless-thermostat\"
  -DTHERMOSTAT_MQTT_DISCOVERY_PREFIX=\"homeassistant\"
  ; -DTHERMOSTAT_FIRMWARE_VERSION=\"v0.0.0\"
  ; -DTHERMOSTAT_DISPLAY_TIMEOUT_S=300
  ; Optional SNTP timezone + servers.
  ; -DTHERMOSTAT_TIME_TZ=\"PST8PDT,M3.2.0,M11.1.0\"
  ; -DTHERMOSTAT_TIME_NTP_1=\"0.pool.ntp.org\"
  ; -DTHERMOSTAT_TIME_NTP_2=\"1.pool.ntp.org\"
  ; -DTHERMOSTAT_TIME_NTP_3=\"2.pool.ntp.org\"
  ; Optional network OTA settings for installed display device.
  ; -DTHERMOSTAT_OTA_HOSTNAME=\"furnace-display\"
  ; -DTHERMOSTAT_OTA_PASSWORD=\"ota_password\"
  ; Optional ESP-NOW provisioning values.
  ; -DTHERMOSTAT_ESPNOW_CHANNEL=6
  ; -DTHERMOSTAT_ESPNOW_PEER_MAC=\"38:18:2B:EC:FB:9C\"
  ; -DTHERMOSTAT_ESPNOW_LMK=\"00112233445566778899AABBCCDDEEFF\"
  ; Optional direct weather feeds (used to replace hardcoded stub values).
  ; -DTHERMOSTAT_MQTT_OUTDOOR_TEMP_TOPIC=\"homeassistant/sensor/outdoor_temp_c/state\"
  ; -DTHERMOSTAT_MQTT_WEATHER_CONDITION_TOPIC=\"homeassistant/sensor/outside_conditions/state\"

[env:esp32-furnace-controller]
build_flags =
  ${env:esp32-furnace-controller.build_flags}
  ; Optional controller WiFi + MQTT for external lockout control surface.
  ; -DTHERMOSTAT_CONTROLLER_WIFI_SSID=\"YOUR_WIFI_SSID\"
  ; -DTHERMOSTAT_CONTROLLER_WIFI_PASSWORD=\"YOUR_WIFI_PASSWORD\"
  ; -DTHERMOSTAT_CONTROLLER_MQTT_HOST=\"192.168.1.10\"
  ; -DTHERMOSTAT_CONTROLLER_MQTT_PORT=1883
  ; -DTHERMOSTAT_CONTROLLER_MQTT_USER=\"mqtt_user\"
  ; -DTHERMOSTAT_CONTROLLER_MQTT_PASSWORD=\"mqtt_password\"
  ; -DTHERMOSTAT_BASE_TOPIC=\"esp32-wireless-thermostat\"
  ; Optional network OTA settings for installed controller device.
  ; -DTHERMOSTAT_CONTROLLER_OTA_HOSTNAME=\"furnace-controller\"
  ; -DTHERMOSTAT_CONTROLLER_OTA_PASSWORD=\"ota_password\"
  ; Optional ESP-NOW provisioning values.
  ; -DTHERMOSTAT_CONTROLLER_ESPNOW_CHANNEL=6
  ; -DTHERMOSTAT_CONTROLLER_ESPNOW_PEER_MAC=\"CC:BA:97:01:8F:88\"
  ; -DTHERMOSTAT_CONTROLLER_ESPNOW_LMK=\"00112233445566778899AABBCCDDEEFF\"

