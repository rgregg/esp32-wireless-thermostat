name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev libmosquitto-dev libcurl4-openssl-dev

      - name: Install PlatformIO
        run: |
          pip install platformio
          pio --version

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: platformio-

      - name: Build native tests
        run: pio run -e native-tests

      - name: Run native test binary
        run: ./.pio/build/native-tests/program

      - name: Build controller firmware
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          command: pio run -e esp32-furnace-controller

      - name: Build controller S3 firmware
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          command: pio run -e esp32-furnace-controller-s3

      - name: Build thermostat firmware
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          command: pio run -e esp32-furnace-thermostat

      - name: Build UI preview
        run: pio run -e native-ui-preview

      - name: Build controller preview
        run: pio run -e native-controller-preview

