name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev libmosquitto-dev

      - name: Install PlatformIO
        run: |
          pip install platformio
          pio --version

      - name: Build native tests
        run: pio run -e native-tests

      - name: Run native test binary
        run: ./.pio/build/native-tests/program

      - name: Build controller firmware
        run: pio run -e esp32-furnace-controller

      - name: Build thermostat firmware
        run: pio run -e esp32-furnace-thermostat

      - name: Build UI preview
        run: pio run -e native-ui-preview

      - name: Build controller preview
        run: pio run -e native-controller-preview

      - name: Verify UI golden screenshots
        run: scripts/ui_golden_check.sh
