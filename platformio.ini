[platformio]
default_envs = native, native-tests

[env]
monitor_speed = 115200
extra_scripts =
  pre:scripts/git_version.py
build_flags =
  -DTHERMOSTAT_PROJECT_NAME=\"esp32-wireless-thermostat\"

[env:native]
platform = native
build_src_filter =
  +<*>
  -<thermostat/ui/fonts/*>
  -<sim/*>
  -<ota_web_updater.cpp>

[env:native-tests]
platform = native
build_flags =
  ${env.build_flags}
  -DTHERMOSTAT_RUN_TESTS
build_src_filter =
  +<*>
  -<thermostat/ui/fonts/*>
  -<main.cpp>
  -<esp32_controller_main.cpp>
  -<esp32_thermostat_main.cpp>
  -<sim/*>
  -<ota_web_updater.cpp>

[env:native-ui-preview]
platform = native
lib_deps =
  lvgl/lvgl@^8.4.0
build_flags =
  ${env.build_flags}
  -DTHERMOSTAT_UI_PREVIEW
  -Iinclude
  -Isrc/sim
  -DLV_CONF_INCLUDE_SIMPLE
  !pkg-config --cflags sdl2
  !pkg-config --libs sdl2
  !pkg-config --cflags --libs libmosquitto
build_src_filter =
  +<sim/thermostat_ui_preview.cpp>
  +<sim/sim_mqtt_client.cpp>
  +<espnow_cmd_word.cpp>
  +<command_builder.cpp>
  +<thermostat/thermostat_app.cpp>
  +<thermostat/thermostat_display_app.cpp>
  +<thermostat/display_model.cpp>
  +<thermostat/thermostat_screen_controller.cpp>
  +<thermostat/thermostat_ui_state.cpp>
  +<thermostat/ui/thermostat_ui_shared.cpp>
  +<thermostat/ui/fonts/thermostat_font_montserrat_20.c>
  +<thermostat/ui/fonts/thermostat_font_montserrat_26.c>
  +<thermostat/ui/fonts/thermostat_font_montserrat_28.c>
  +<thermostat/ui/fonts/thermostat_font_montserrat_30.c>
  +<thermostat/ui/fonts/thermostat_font_montserrat_40.c>
  +<thermostat/ui/fonts/thermostat_font_montserrat_48.c>
  +<thermostat/ui/fonts/thermostat_font_montserrat_80.c>
  +<thermostat/ui/fonts/thermostat_font_montserrat_120.c>
  +<thermostat/ui/fonts/thermostat_font_mdi_weather_30.c>

[env:esp32-furnace-controller]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32dev
framework = arduino
board_build.partitions = partitions_no_spiffs.csv
; Reduce TLS heap footprint for HTTPS weather fetches:
;   VARIABLE_BUFFER_LENGTH: allocate TX/RX buffers only during active I/O,
;   freeing them immediately after each TLS record (~40KB → ~0KB steady-state).
;   ASYMMETRIC_CONTENT_LEN: shrink TX buffer to 4KB since our HTTP GETs are tiny;
;   keep RX at 16KB to handle full-size server TLS records.
;   KEEP_PEER_CERTIFICATE disabled: unused since we call setInsecure().
custom_sdkconfig =
  CONFIG_MBEDTLS_SSL_VARIABLE_BUFFER_LENGTH=y
  CONFIG_MBEDTLS_ASYMMETRIC_CONTENT_LEN=y
  CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=16384
  CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
; Strip managed components we don't need (mirrors thermostat env)
custom_component_remove =
  espressif/esp_hosted
  espressif/esp_wifi_remote
  espressif/esp-dsp
  espressif/esp_insights
  espressif/esp_rainmaker
  espressif/rmaker_common
  espressif/esp_schedule
  espressif/json_generator
  espressif/json_parser
  espressif/esp_diagnostics
  espressif/cbor
  espressif/esp_diag_data_store
  espressif/esp-zboss-lib
  espressif/esp-zigbee-lib
  espressif/esp-sr
  espressif/esp-modbus
  espressif/esp_modem
  espressif/qrcode
  espressif/network_provisioning
  chmorgan/esp-libhelix-mp3
  espressif/fb_gfx
  espressif/dl_fft
  espressif/esp-serial-flasher
lib_deps =
  knolleary/PubSubClient@^2.8
  jnthas/Improv WiFi Library@^0.0.4
  h2zero/NimBLE-Arduino@^2.3.7
build_src_filter =
  +<*>
  -<main.cpp>
  -<esp32_thermostat_main.cpp>
  -<thermostat/esp32s3_thermostat_firmware.cpp>
  -<thermostat/ui/*>
  -<thermostat/ui/fonts/*>
  -<sim/*>
  -<bootstrap/*>
build_flags =
  ${env.build_flags}
  -DTHERMOSTAT_ROLE_CONTROLLER
  -DIMPROV_WIFI_BLE_ENABLED

[env:native-controller-preview]
platform = native
build_flags =
  ${env.build_flags}
  -DTHERMOSTAT_CONTROLLER_PREVIEW
  -Iinclude
  -Isrc/sim
  !pkg-config --cflags sdl2 SDL2_ttf
  !pkg-config --libs sdl2 SDL2_ttf
  !pkg-config --cflags --libs libmosquitto
  !pkg-config --cflags --libs libcurl
build_src_filter =
  +<sim/controller_preview.cpp>
  +<sim/sim_mqtt_client.cpp>
  +<sim/sim_weather_client.cpp>
  +<controller/pirateweather.cpp>
  +<controller/controller_app.cpp>
  +<controller/controller_runtime.cpp>
  +<controller/controller_relay_io.cpp>
  +<command_builder.cpp>
  +<thermostat/thermostat_state.cpp>
  +<espnow_cmd_word.cpp>

[env:esp32-furnace-thermostat]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.flash_mode = dio
board_build.arduino.memory_type = qio_opi
; HybridCompile: rebuild ESP-IDF from source with SPIRAM XIP + LCD DMA safety
custom_sdkconfig =
  CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240=y
  CONFIG_ESP32S3_DATA_CACHE_64KB=y
  CONFIG_ESP32S3_DATA_CACHE_LINE_64B=y
  CONFIG_SPIRAM_FETCH_INSTRUCTIONS=y
  CONFIG_SPIRAM_RODATA=y
  CONFIG_LCD_RGB_ISR_IRAM_SAFE=y
  CONFIG_LCD_RGB_RESTART_IN_VSYNC=y
  CONFIG_GDMA_CTRL_FUNC_IN_IRAM=y
  CONFIG_GDMA_ISR_IRAM_SAFE=y
  CONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED=y
  CONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED=y
  CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
  CONFIG_BT_NIMBLE_MAX_BONDS=3
  CONFIG_BT_NIMBLE_MAX_CCCDS=6
; Strip managed components we don't need (reduces build time and avoids cert errors)
custom_component_remove =
  espressif/esp_hosted
  espressif/esp_wifi_remote
  espressif/esp-dsp
  espressif/esp_insights
  espressif/esp_rainmaker
  espressif/rmaker_common
  espressif/esp_schedule
  espressif/json_generator
  espressif/json_parser
  espressif/esp_diagnostics
  espressif/cbor
  espressif/esp_diag_data_store
  espressif/esp-zboss-lib
  espressif/esp-zigbee-lib
  espressif/esp-sr
  espressif/esp-modbus
  espressif/esp_modem
  espressif/qrcode
  espressif/network_provisioning
  chmorgan/esp-libhelix-mp3
  espressif/fb_gfx
  espressif/dl_fft
  espressif/esp-serial-flasher
lib_ignore = dsp, spiffs, Matter, Zigbee, ESP RainMaker
lib_deps =
  lvgl/lvgl@^8.3.11
  adafruit/Adafruit AHTX0@^2.0.5
  adafruit/Adafruit Si7021 Library@^1.5.3
  adafruit/Adafruit Unified Sensor@^1.1.15
  knolleary/PubSubClient@^2.8
  jnthas/Improv WiFi Library@^0.0.4
  h2zero/NimBLE-Arduino@^2.3.7
build_src_filter =
  +<*>
  -<main.cpp>
  -<esp32_controller_main.cpp>
  -<sim/*>
  -<bootstrap/*>
build_flags =
  ${env.build_flags}
  -DBOARD_HAS_PSRAM
  -DTHERMOSTAT_ROLE_THERMOSTAT
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_CONF_PATH=lv_conf.h
  -Iinclude
  -DIMPROV_WIFI_BLE_ENABLED
  -DCONFIG_ENABLE_ARDUINO_DEPENDS

; Minimal bootstrap firmware for the ESP32-S3 display.
; Use this to recover OTA when the full firmware can't be OTA'd from old firmware
; due to insufficient internal SRAM.  Flash this first (it's small enough to
; succeed), then OTA the full firmware from the bootstrap's /update endpoint.
[env:esp32s3-display-bootstrap]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.flash_mode = dio
; No PSRAM, no SPIRAM sdkconfig — maximize internal SRAM headroom during OTA
custom_component_remove =
  espressif/esp_hosted
  espressif/esp_wifi_remote
  espressif/esp-dsp
  espressif/esp_insights
  espressif/esp_rainmaker
  espressif/rmaker_common
  espressif/esp_schedule
  espressif/json_generator
  espressif/json_parser
  espressif/esp_diagnostics
  espressif/cbor
  espressif/esp_diag_data_store
  espressif/esp-zboss-lib
  espressif/esp-zigbee-lib
  espressif/esp-sr
  espressif/esp-modbus
  espressif/esp_modem
  espressif/qrcode
  espressif/network_provisioning
  chmorgan/esp-libhelix-mp3
  espressif/fb_gfx
  espressif/dl_fft
  espressif/esp-serial-flasher
build_src_filter = +<bootstrap/esp32s3_display_bootstrap.cpp>
build_flags =
  ${env.build_flags}
