[platformio]
default_envs = native, native-tests

[env]
monitor_speed = 115200
extra_scripts =
  pre:scripts/git_version.py
build_flags =
  -DTHERMOSTAT_PROJECT_NAME=\"esp32-wireless-thermostat\"

; Linker wrap that activates the Arduino core's set_arduino_panic_handler() path
; (the core defines __wrap_esp_panic_handler / __real_esp_panic_handler). Arduino IDE
; adds this via platform.txt; PlatformIO/pioarduino does NOT, so firmware envs that
; use the panic-PC breadcrumb must include it explicitly — without it, our on_panic
; callback is never invoked and the breadcrumb is never written (verified on hardware).
[panic_wrap]
build_flags =
  -Wl,--wrap=esp_panic_handler

[env:native]
platform = native
build_src_filter =
  +<*>
  -<thermostat/ui/fonts/*>
  -<sim/*>
  -<ota_web_updater.cpp>

[env:native-tests]
platform = native
build_flags =
  ${env.build_flags}
  -DTHERMOSTAT_RUN_TESTS
build_src_filter =
  +<*>
  -<thermostat/ui/fonts/*>
  -<main.cpp>
  -<esp32_controller_main.cpp>
  -<esp32_thermostat_main.cpp>
  -<sim/*>
  -<ota_web_updater.cpp>
  -<bootstrap/*>

[env:native-ui-preview]
platform = native
lib_deps =
  lvgl/lvgl@^8.4.0
build_flags =
  ${env.build_flags}
  -DTHERMOSTAT_UI_PREVIEW
  -Iinclude
  -Isrc/sim
  -DLV_CONF_INCLUDE_SIMPLE
  !pkg-config --cflags sdl2
  !pkg-config --libs sdl2
  !pkg-config --cflags --libs libmosquitto
build_src_filter =
  +<sim/thermostat_ui_preview.cpp>
  +<sim/sim_mqtt_client.cpp>
  +<espnow_cmd_word.cpp>
  +<command_builder.cpp>
  +<thermostat/thermostat_app.cpp>
  +<thermostat/thermostat_display_app.cpp>
  +<thermostat/display_model.cpp>
  +<thermostat/thermostat_screen_controller.cpp>
  +<thermostat/thermostat_ui_state.cpp>
  +<thermostat/ui/thermostat_ui_shared.cpp>
  +<thermostat/ui/fonts/thermostat_font_montserrat_20.c>
  +<thermostat/ui/fonts/thermostat_font_montserrat_26.c>
  +<thermostat/ui/fonts/thermostat_font_montserrat_28.c>
  +<thermostat/ui/fonts/thermostat_font_montserrat_30.c>
  +<thermostat/ui/fonts/thermostat_font_montserrat_40.c>
  +<thermostat/ui/fonts/thermostat_font_montserrat_48.c>
  +<thermostat/ui/fonts/thermostat_font_montserrat_80.c>
  +<thermostat/ui/fonts/thermostat_font_montserrat_120.c>
  +<thermostat/ui/fonts/thermostat_font_mdi_weather_30.c>

[env:esp32-furnace-controller]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32dev
framework = arduino
board_build.partitions = partitions_no_spiffs.csv
; Reduce TLS heap footprint for HTTPS weather fetches:
;   VARIABLE_BUFFER_LENGTH: allocate TX/RX buffers only during active I/O,
;   freeing them immediately after each TLS record (~40KB → ~0KB steady-state).
;   ASYMMETRIC_CONTENT_LEN: shrink TX buffer to 4KB since our HTTP GETs are tiny;
;   keep RX at 16KB to handle full-size server TLS records.
;   KEEP_PEER_CERTIFICATE disabled: unused since we call setInsecure().
custom_sdkconfig =
  CONFIG_MBEDTLS_SSL_VARIABLE_BUFFER_LENGTH=y
  CONFIG_MBEDTLS_ASYMMETRIC_CONTENT_LEN=y
  CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=16384
  CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
; Strip managed components we don't need (mirrors thermostat env)
custom_component_remove =
  espressif/esp_hosted
  espressif/esp_wifi_remote
  espressif/esp-dsp
  espressif/esp_insights
  espressif/esp_rainmaker
  espressif/rmaker_common
  espressif/esp_schedule
  espressif/json_generator
  espressif/json_parser
  espressif/esp_diagnostics
  espressif/cbor
  espressif/esp_diag_data_store
  espressif/esp-zboss-lib
  espressif/esp-zigbee-lib
  espressif/esp-sr
  espressif/esp-modbus
  espressif/esp_modem
  espressif/qrcode
  espressif/network_provisioning
  chmorgan/esp-libhelix-mp3
  espressif/fb_gfx
  espressif/dl_fft
  espressif/esp-serial-flasher
lib_deps =
  knolleary/PubSubClient@^2.8
build_src_filter =
  +<*>
  -<main.cpp>
  -<esp32_thermostat_main.cpp>
  -<thermostat/esp32s3_thermostat_firmware.cpp>
  -<thermostat/ui/*>
  -<thermostat/ui/fonts/*>
  -<sim/*>
  -<bootstrap/*>
build_flags =
  ${env.build_flags}
  -DTHERMOSTAT_ROLE_CONTROLLER
  ${panic_wrap.build_flags}

[env:native-controller-preview]
platform = native
build_flags =
  ${env.build_flags}
  -DTHERMOSTAT_CONTROLLER_PREVIEW
  -Iinclude
  -Isrc/sim
  !pkg-config --cflags sdl2 SDL2_ttf
  !pkg-config --libs sdl2 SDL2_ttf
  !pkg-config --cflags --libs libmosquitto
  !pkg-config --cflags --libs libcurl
build_src_filter =
  +<sim/controller_preview.cpp>
  +<sim/sim_mqtt_client.cpp>
  +<sim/sim_weather_client.cpp>
  +<controller/pirateweather.cpp>
  +<controller/controller_app.cpp>
  +<controller/controller_runtime.cpp>
  +<controller/controller_relay_io.cpp>
  +<command_builder.cpp>
  +<thermostat/thermostat_state.cpp>
  +<espnow_cmd_word.cpp>

[env:esp32-furnace-thermostat]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.flash_mode = dio
board_build.arduino.memory_type = qio_opi
; HybridCompile: rebuild ESP-IDF from source with SPIRAM XIP + LCD DMA safety
custom_sdkconfig =
  CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240=y
  CONFIG_ESP32S3_DATA_CACHE_64KB=y
  CONFIG_ESP32S3_DATA_CACHE_LINE_64B=y
  CONFIG_SPIRAM_FETCH_INSTRUCTIONS=y
  CONFIG_SPIRAM_RODATA=y
  CONFIG_LCD_RGB_ISR_IRAM_SAFE=y
  CONFIG_LCD_RGB_RESTART_IN_VSYNC=y
  CONFIG_GDMA_CTRL_FUNC_IN_IRAM=y
  CONFIG_GDMA_ISR_IRAM_SAFE=y
  CONFIG_BT_ENABLED=y
  CONFIG_BT_NIMBLE_ENABLED=y
  CONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED=y
  CONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED=y
  CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
  CONFIG_BT_NIMBLE_MAX_BONDS=1
  CONFIG_BT_NIMBLE_MAX_CCCDS=6
  CONFIG_BT_NIMBLE_SECURITY_ENABLE=n
  CONFIG_BT_NIMBLE_NVS_PERSIST=n
  CONFIG_BT_NIMBLE_50_FEATURE_SUPPORT=n
; Strip managed components we don't need (reduces build time and avoids cert errors)
custom_component_remove =
  espressif/esp_hosted
  espressif/esp_wifi_remote
  espressif/esp-dsp
  espressif/esp_insights
  espressif/esp_rainmaker
  espressif/rmaker_common
  espressif/esp_schedule
  espressif/json_generator
  espressif/json_parser
  espressif/esp_diagnostics
  espressif/cbor
  espressif/esp_diag_data_store
  espressif/esp-zboss-lib
  espressif/esp-zigbee-lib
  espressif/esp-sr
  espressif/esp-modbus
  espressif/esp_modem
  espressif/qrcode
  espressif/network_provisioning
  chmorgan/esp-libhelix-mp3
  espressif/fb_gfx
  espressif/dl_fft
  espressif/esp-serial-flasher
lib_ignore = dsp, spiffs, Matter, Zigbee, ESP RainMaker
lib_deps =
  lvgl/lvgl@^8.3.11
  adafruit/Adafruit AHTX0@^2.0.5
  adafruit/Adafruit Si7021 Library@^1.5.3
  adafruit/Adafruit Unified Sensor@^1.1.15
  knolleary/PubSubClient@^2.8
  jnthas/Improv WiFi Library@^0.0.4
  h2zero/NimBLE-Arduino@^2.3.7
build_src_filter =
  +<*>
  -<main.cpp>
  -<esp32_controller_main.cpp>
  -<sim/*>
  -<bootstrap/*>
build_flags =
  ${env.build_flags}
  -DBOARD_HAS_PSRAM
  -DTHERMOSTAT_ROLE_THERMOSTAT
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_CONF_PATH=lv_conf.h
  -Iinclude
  -DCONFIG_ENABLE_ARDUINO_DEPENDS
  -DIMPROV_WIFI_BLE_ENABLED
  -DTHERMOSTAT_BLE_PROVISIONING

; SoftAP-portal display build (rollback / safety path). Identical to
; esp32-furnace-thermostat but without BLE/Improv: no NimBLE, no BLE flags, BT disabled.
[env:esp32-furnace-thermostat-softap]
extends = env:esp32-furnace-thermostat
lib_deps =
  lvgl/lvgl@^8.3.11
  adafruit/Adafruit AHTX0@^2.0.5
  adafruit/Adafruit Si7021 Library@^1.5.3
  adafruit/Adafruit Unified Sensor@^1.1.15
  knolleary/PubSubClient@^2.8
build_flags =
  ${env.build_flags}
  -DBOARD_HAS_PSRAM
  -DTHERMOSTAT_ROLE_THERMOSTAT
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_CONF_PATH=lv_conf.h
  -Iinclude
  -DCONFIG_ENABLE_ARDUINO_DEPENDS
custom_sdkconfig =
  CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240=y
  CONFIG_ESP32S3_DATA_CACHE_64KB=y
  CONFIG_ESP32S3_DATA_CACHE_LINE_64B=y
  CONFIG_SPIRAM_FETCH_INSTRUCTIONS=y
  CONFIG_SPIRAM_RODATA=y
  CONFIG_LCD_RGB_ISR_IRAM_SAFE=y
  CONFIG_LCD_RGB_RESTART_IN_VSYNC=y
  CONFIG_GDMA_CTRL_FUNC_IN_IRAM=y
  CONFIG_GDMA_ISR_IRAM_SAFE=y

; Test environments — isolated MQTT topic, ESP-NOW channel, and encryption key
; so bench devices don't interfere with production devices.
[env:esp32-furnace-controller-test]
extends = env:esp32-furnace-controller
build_flags =
  ${env:esp32-furnace-controller.build_flags}
  -DTHERMOSTAT_BASE_TOPIC=\"esp32-wireless-thermostat-test\"
  -DTHERMOSTAT_CONTROLLER_ESPNOW_CHANNEL=11
  -DTHERMOSTAT_CONTROLLER_ESPNOW_LMK=\"f0e1d2c3b4a596870718293a4b5c6d7e\"
  -DTHERMOSTAT_CONTROLLER_OTA_HOSTNAME=\"test-furnace-controller\"

[env:esp32-furnace-thermostat-test]
extends = env:esp32-furnace-thermostat-softap
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=0  ; bench: Serial on UART0 (CH340), no USB-CDC host block
  ${env:esp32-furnace-thermostat-softap.build_flags}
  -DTHERMOSTAT_BASE_TOPIC=\"esp32-wireless-thermostat-test\"
  -DTHERMOSTAT_ESPNOW_CHANNEL=11
  -DTHERMOSTAT_ESPNOW_LMK=\"f0e1d2c3b4a596870718293a4b5c6d7e\"
  -DTHERMOSTAT_OTA_HOSTNAME=\"test-furnace-thermostat\"

; ESP-NOW-only bench display: like the test env but never joins WiFi / BLE
; provisioning — brings up the LCD + ESP-NOW only (channel 11). Lets the spare
; ESP32-8048S043C validate the controller<->display ESP-NOW link in isolation,
; with no WiFi association to fight the pinned ESP-NOW channel. No secrets.
[env:thermostat-bench-espnow]
extends = env:esp32-furnace-thermostat-test
build_flags =
  ${env:esp32-furnace-thermostat-test.build_flags}
  -DTHERMOSTAT_WIFI_DISABLED=1

; Normal-config bench display: full WiFi + MQTT + web (NOT ESP-NOW-only), pointed at an
; isolated local test broker. WiFi creds / broker host come from a gitignored header
; (include/bench_wifi_secrets.h) force-included here — no secrets in the repo.
[env:thermostat-bench-normal]
extends = env:esp32-furnace-thermostat-test
build_flags =
  ${env:esp32-furnace-thermostat-test.build_flags}
  -include include/bench_wifi_secrets.h

; Minimal bootstrap firmware for the ESP32-S3 display.
; Use this to recover OTA when the full firmware can't be OTA'd from old firmware
; due to insufficient internal SRAM.  Flash this first (it's small enough to
; succeed), then OTA the full firmware from the bootstrap's /update endpoint.
[env:esp32s3-display-bootstrap]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.flash_mode = dio
; No PSRAM, no SPIRAM sdkconfig — maximize internal SRAM headroom during OTA
custom_component_remove =
  espressif/esp_hosted
  espressif/esp_wifi_remote
  espressif/esp-dsp
  espressif/esp_insights
  espressif/esp_rainmaker
  espressif/rmaker_common
  espressif/esp_schedule
  espressif/json_generator
  espressif/json_parser
  espressif/esp_diagnostics
  espressif/cbor
  espressif/esp_diag_data_store
  espressif/esp-zboss-lib
  espressif/esp-zigbee-lib
  espressif/esp-sr
  espressif/esp-modbus
  espressif/esp_modem
  espressif/qrcode
  espressif/network_provisioning
  chmorgan/esp-libhelix-mp3
  espressif/fb_gfx
  espressif/dl_fft
  espressif/esp-serial-flasher
build_src_filter = +<bootstrap/esp32s3_display_bootstrap.cpp>
build_flags =
  ${env.build_flags}

; --- Bench validation: controller firmware on a stand-in ESP32-S3 board ---------
; Runs the controller firmware on an Adafruit Feather ESP32-S3 (8MB, no PSRAM) for
; on-device validation of crash diagnostics + resilience BEFORE the real Waveshare
; board. No relay/Ethernet hardware: CONTROLLER_BOARD_S3 selects GpioRelayBackend on
; spare GPIOs (nothing wired) and WiFi stands in for Ethernet. Isolated test identity
; (test base topic + ESP-NOW channel/LMK) so it can never touch production devices.
; Serial+panic console on the USB-Serial-JTAG (HWCDC) via ARDUINO_USB_CDC_ON_BOOT.
[env:esp32-furnace-controller-s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv
board_build.flash_mode = dio
; custom_sdkconfig triggers the hybrid source rebuild (pioarduino only honors
; custom_component_remove during a source build). The single benign setting below
; is enough to switch modes; the component_remove then resolves the prebuilt
; framework's stale network_provisioning include. First build is slow (~10 min),
; then cached. (Mirrors the production controller/thermostat envs, which set both.)
custom_sdkconfig =
  CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240=y
custom_component_remove =
  espressif/esp_hosted
  espressif/esp_wifi_remote
  espressif/esp-dsp
  espressif/esp_insights
  espressif/esp_rainmaker
  espressif/rmaker_common
  espressif/esp_schedule
  espressif/json_generator
  espressif/json_parser
  espressif/esp_diagnostics
  espressif/cbor
  espressif/esp_diag_data_store
  espressif/esp-zboss-lib
  espressif/esp-zigbee-lib
  espressif/esp-sr
  espressif/esp-modbus
  espressif/esp_modem
  espressif/qrcode
  espressif/network_provisioning
  chmorgan/esp-libhelix-mp3
  espressif/fb_gfx
  espressif/dl_fft
  espressif/esp-serial-flasher
lib_deps =
  knolleary/PubSubClient@^2.8
build_src_filter =
  +<*>
  -<main.cpp>
  -<esp32_thermostat_main.cpp>
  -<thermostat/esp32s3_thermostat_firmware.cpp>
  -<thermostat/ui/*>
  -<thermostat/ui/fonts/*>
  -<sim/*>
  -<bootstrap/*>
build_flags =
  ${env.build_flags}
  -DTHERMOSTAT_ROLE_CONTROLLER
  -DCONTROLLER_BOARD_S3
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DTHERMOSTAT_BASE_TOPIC=\"esp32-wireless-thermostat-test\"
  -DTHERMOSTAT_CONTROLLER_ESPNOW_CHANNEL=11
  -DTHERMOSTAT_CONTROLLER_ESPNOW_LMK=\"f0e1d2c3b4a596870718293a4b5c6d7e\"
  -DTHERMOSTAT_CONTROLLER_OTA_HOSTNAME=\"test-furnace-controller-s3\"
  ${panic_wrap.build_flags}

; Bench controller for the isolated end-to-end ESP-NOW test: like controller-s3 but
; defaults its device list to the broadcast peer, so it transmits heartbeats/telemetry
; to any listening bench display (which then shows "controller connected"). Broadcast
; peer ⇒ unencrypted, so it pairs with the unencrypted ESP-NOW-only bench display.
[env:controller-bench-espnow]
extends = env:esp32-furnace-controller-s3
build_flags =
  ${env:esp32-furnace-controller-s3.build_flags}
  -DTHERMOSTAT_CONTROLLER_DEVICES=\"FF:FF:FF:FF:FF:FF\"

; --- Real production controller: Waveshare ESP32-S3-ETH-8DI-8RO -----------------
; The actual target board (N16R8 module = 16MB flash + 8MB PSRAM). NOTE: PSRAM is
; intentionally NOT enabled here — the controller firmware fits comfortably in
; internal SRAM (~21% used) and the bench S3 board is nopsram, so we keep parity and
; avoid the octal-PSRAM pin-mux. To enable PSRAM later, add board_build.arduino.
; memory_type=qio_opi + -DBOARD_HAS_PSRAM + SPIRAM sdkconfig, and first verify the
; octal-PSRAM pins don't collide with the W5500 SPI / PCA9554 I2C / relay pins.
; Inherits the hybrid source-build config (custom_sdkconfig/custom_component_remove,
; lib_deps, build_src_filter) from the s3 bench env above. -DCONTROLLER_BOARD_WAVESHARE
; selects Pca9554RelayBackend (relays @0x20, verified mapping) + silences the
; on-board buzzer (GPIO46) at boot. 16MB partition table includes a coredump
; partition. Still on the isolated TEST identity (test base topic + ESP-NOW
; channel/LMK) until cutover — identity override is a later plan step — so it can
; never touch production devices.
[env:esp32-furnace-controller-waveshare]
extends = env:esp32-furnace-controller-s3
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
  ${env.build_flags}
  -DTHERMOSTAT_ROLE_CONTROLLER
  -DCONTROLLER_BOARD_WAVESHARE
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DTHERMOSTAT_BASE_TOPIC=\"esp32-wireless-thermostat-test\"
  -DTHERMOSTAT_CONTROLLER_ESPNOW_CHANNEL=11
  -DTHERMOSTAT_CONTROLLER_ESPNOW_LMK=\"f0e1d2c3b4a596870718293a4b5c6d7e\"
  -DTHERMOSTAT_CONTROLLER_OTA_HOSTNAME=\"test-furnace-controller-wave\"
  ${panic_wrap.build_flags}

; Bench Waveshare controller for the isolated end-to-end ESP-NOW test: the real
; target board (RTC + SNTP time source, so it exercises the time-over-ESP-NOW
; broadcast), with the device list defaulted to the broadcast peer so it transmits
; heartbeats/telemetry/time to any listening bench display.
[env:controller-bench-espnow-waveshare]
extends = env:esp32-furnace-controller-waveshare
build_flags =
  ${env:esp32-furnace-controller-waveshare.build_flags}
  -DTHERMOSTAT_CONTROLLER_DEVICES=\"FF:FF:FF:FF:FF:FF\"

; --- PRODUCTION controller firmware for the Waveshare board ----------------------
; Identical to esp32-furnace-controller-waveshare EXCEPT it drops the test identity
; overrides, so it uses the SAME defaults as the classic production controller:
; base topic "esp32-wireless-thermostat", ESP-NOW channel 6, the production LMK. That
; means it talks to the real thermostat display + the real MQTT/HA. For a true
; drop-in, also set NVS "id_mac" to the controller being replaced (38:18:2B:EC:FB:9C)
; so it assumes that controller's MAC for HA identity + ESP-NOW. Use this env ONLY for
; the actual cutover (the test env above is for bench work).
[env:esp32-furnace-controller-waveshare-prod]
extends = env:esp32-furnace-controller-s3
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
  ${env.build_flags}
  -DTHERMOSTAT_ROLE_CONTROLLER
  -DCONTROLLER_BOARD_WAVESHARE
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DTHERMOSTAT_CONTROLLER_OTA_HOSTNAME=\"furnace-controller-s3\"
  ${panic_wrap.build_flags}

; --- Minimal panic-breadcrumb on-device self-test (no WiFi/MQTT) ----------------
; Compiles ONLY the selftest sketch + the panic hook, so it avoids the heavy network
; stack (and the pioarduino network_provisioning prebuilt-header issue) entirely.
; Flash to the Adafruit Feather ESP32-S3, watch serial: boot1 panics, boot2 recovers
; the PC from RTC. Uses the Feather board profile (TinyUSB CDC, USB_MODE=0) on purpose:
; TinyUSB ignores host DTR/RTS, so opening the port to read it does NOT reset the chip
; (unlike the hardware USB-Serial-JTAG), which lets the serial be captured headlessly.
[env:s3-panic-selftest]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = adafruit_feather_esp32s3_nopsram
framework = arduino
board_build.partitions = default_8MB.csv
board_build.flash_mode = dio
build_src_filter =
  -<*>
  +<bench/panic_selftest.cpp>
  +<controller/panic_breadcrumb_hook.cpp>
build_flags =
  ${env.build_flags}
  -DPANIC_SELFTEST
  ${panic_wrap.build_flags}

; --- Waveshare ESP32-S3-ETH-8DI-8RO board bring-up (I2C/PCA9554 + relay safe-state) ---
; Minimal sketch: confirms the relay expander pinout and the boot-time relay safe state
; over serial. No WiFi (dodges the network_provisioning build quirk -> fast prebuilt build).
[env:waveshare-bringup]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.flash_mode = dio
build_src_filter =
  -<*>
  +<bench/waveshare_bringup.cpp>
build_flags =
  ${env.build_flags}
  -DWAVESHARE_BRINGUP
  -DARDUINO_USB_CDC_ON_BOOT=1

; --- Waveshare relay control-path validation (silences buzzer; drives relays via the real control path) ---
[env:waveshare-relay-validate]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.flash_mode = dio
build_src_filter =
  -<*>
  +<bench/waveshare_relay_validate.cpp>
  +<controller/controller_relay_io.cpp>
  +<controller/pca9554_relay_backend.cpp>
build_flags =
  ${env.build_flags}
  -DWAVESHARE_RELAY_VALIDATE
  -DARDUINO_USB_CDC_ON_BOOT=1

