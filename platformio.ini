[platformio]
default_envs = native, native-tests

[env]
monitor_speed = 115200
build_flags =
  -DTHERMOSTAT_PROJECT_NAME=\"esp32-wireless-thermostat\"

[env:native]
platform = native
build_src_filter = +<*>

[env:native-tests]
platform = native
build_flags =
  ${env.build_flags}
  -DTHERMOSTAT_RUN_TESTS
build_src_filter =
  +<*>
  -<main.cpp>

[env:esp32dev-controller]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
  knolleary/PubSubClient@^2.8
build_flags =
  ${env.build_flags}
  -DTHERMOSTAT_ROLE_CONTROLLER

[env:esp32s3-display]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size = 16MB
board_build.flash_mode = dio
lib_deps =
  lvgl/lvgl@^8.3.11
  adafruit/Adafruit AHTX0@^2.0.5
  adafruit/Adafruit Unified Sensor@^1.1.15
  knolleary/PubSubClient@^2.8
build_flags =
  ${env.build_flags}
  -DBOARD_HAS_PSRAM
  -DTHERMOSTAT_ROLE_THERMOSTAT
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_CONF_PATH=lv_conf.h
